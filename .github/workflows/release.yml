name: Package and Release VSIX

on:
  push:

permissions:
  contents: write  # Needed to push tags and create releases

jobs:
  release-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Set unique version for push
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            VERSION="$BASE_VERSION"
          else
            VERSION="${BASE_VERSION}-beta.${{ github.run_number }}"
            # Temporarily bump package.json version so vsce packages a unique version
            npm version $VERSION --no-git-tag-version --allow-same-version
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ env.VERSION }}$"; then
            echo "Tag v${{ env.VERSION }} already exists."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"

      - name: Package VSIX
        if: steps.check_tag.outputs.exists == 'false'
        run: npx @vscode/vsce package

      - name: Upload VSIX to GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "Release ${{ env.VERSION }}"
          files: "*.vsix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}